[database]
database ansible_host=DATABASE_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem

[proxy]
proxy ansible_host=PROXY_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem

[backend]
backend-1 ansible_host=BACKEND_1_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem
backend-2 ansible_host=BACKEND_2_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem
backend-3 ansible_host=BACKEND_3_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem

[monitoring]
monitoring ansible_host=MONITORING_IP ansible_user=opc ansible_ssh_private_key_file=~/.ssh/sua-chave.pem

[all_servers:children]
database
proxy
backend
